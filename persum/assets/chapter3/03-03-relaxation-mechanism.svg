<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
  <title>3.3 松弛变量：给每条规则装一个开关</title>
  <desc>给每条规则添加二进制开关ri，当ri=1时规则被暂时绕过；求解器最小化sum(ri)</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#64748b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg3)"/>

  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a" letter-spacing="1">3.3 松弛变量：给每条规则装一个开关</text>
  <line x1="150" y1="58" x2="1050" y2="58" stroke="#cbd5e1" stroke-width="1.5"/>

  <rect x="80" y="70" width="1040" height="50" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="600" y="92" text-anchor="middle" font-size="13" fill="#1e40af" font-weight="600">核心思想：给每条规则安装一个二进制开关 ri，当 ri=1 时规则被暂时绕过</text>
  <text x="600" y="110" text-anchor="middle" font-size="12" fill="#64748b">求解器目标：最小化激活的开关数量（minimize sum of ri）</text>

  <text x="100" y="148" font-size="13" font-weight="700" fill="#334155">原始规则</text>
  <text x="320" y="148" font-size="13" font-weight="700" fill="#334155">添加松弛变量后</text>
  <text x="530" y="148" font-size="13" font-weight="700" fill="#334155">开关</text>
  <line x1="90" y1="155" x2="270" y2="155" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="300" y1="155" x2="500" y2="155" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="520" y1="155" x2="640" y2="155" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="660" y="130" width="460" height="50" rx="10" fill="#1e3a5f" filter="url(#shadow3)"/>
  <text x="890" y="155" font-size="14" fill="white" font-weight="700" text-anchor="middle">M = 100（大数 Big-M）</text>
  <text x="890" y="172" font-size="12" fill="#94a3b8" text-anchor="middle">当 r=1 时，约束几乎失效（虚拟无约束）</text>

  <g transform="translate(80,165)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#3b82f6"/>
    <text x="18" y="20" font-size="11" font-weight="700" fill="#3b82f6">规则 1</text>
    <text x="18" y="42" font-size="14" fill="#334155" font-weight="600">A + B ≥ 8</text>
    <text x="18" y="60" font-size="11" fill="#94a3b8">下界约束</text>
  </g>
  <g transform="translate(305,165)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="18" y="20" font-size="12" fill="#334155" font-weight="600">A + B ≥ 8 - M*r1</text>
    <text x="18" y="42" font-size="11" fill="#475569">r1=0：保持原约束 ≥8</text>
    <text x="18" y="58" font-size="11" fill="#64748b">r1=1：≥ -92（几乎无下界）</text>
  </g>
  <g transform="translate(530,165)">
    <rect x="0" y="0" width="110" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">r1</text>
    <rect x="25" y="28" width="60" height="24" rx="12" fill="#e2e8f0"/>
    <circle cx="32" cy="40" r="9" fill="#94a3b8"/>
    <text x="55" y="62" text-anchor="middle" font-size="10" fill="#64748b">关 = 0</text>
  </g>

  <g transform="translate(80,245)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#10b981"/>
    <text x="18" y="20" font-size="11" font-weight="700" fill="#10b981">规则 2</text>
    <text x="18" y="42" font-size="14" fill="#334155" font-weight="600">C ≤ 3</text>
    <text x="18" y="60" font-size="11" fill="#94a3b8">上界约束</text>
  </g>
  <g transform="translate(305,245)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <text x="18" y="20" font-size="12" fill="#334155" font-weight="600">C ≤ 3 + M*r2</text>
    <text x="18" y="42" font-size="11" fill="#475569">r2=0：保持原约束 ≤3</text>
    <text x="18" y="58" font-size="11" fill="#64748b">r2=1：≤ 103（几乎无上界）</text>
  </g>
  <g transform="translate(530,245)">
    <rect x="0" y="0" width="110" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">r2</text>
    <rect x="25" y="28" width="60" height="24" rx="12" fill="#22c55e"/>
    <circle cx="77" cy="40" r="9" fill="white"/>
    <text x="55" y="62" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="700">开 = 1</text>
  </g>

  <g transform="translate(80,325)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#8b5cf6"/>
    <text x="18" y="20" font-size="11" font-weight="700" fill="#8b5cf6">规则 3</text>
    <text x="18" y="42" font-size="14" fill="#334155" font-weight="600">A &gt; 4 → C ≥ 2</text>
    <text x="18" y="60" font-size="11" fill="#94a3b8">蕴含约束</text>
  </g>
  <g transform="translate(305,325)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="18" y="20" font-size="12" fill="#334155" font-weight="600">蕴含变量 + 松弛变量</text>
    <text x="18" y="42" font-size="11" fill="#475569">通过辅助变量实现</text>
    <text x="18" y="58" font-size="11" fill="#64748b">并附加 r3 松弛</text>
  </g>
  <g transform="translate(530,325)">
    <rect x="0" y="0" width="110" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">r3</text>
    <rect x="25" y="28" width="60" height="24" rx="12" fill="#e2e8f0"/>
    <circle cx="32" cy="40" r="9" fill="#94a3b8"/>
    <text x="55" y="62" text-anchor="middle" font-size="10" fill="#64748b">关 = 0</text>
  </g>

  <g transform="translate(80,405)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#ef4444"/>
    <text x="18" y="20" font-size="11" font-weight="700" fill="#ef4444">规则 4</text>
    <text x="18" y="42" font-size="14" fill="#334155" font-weight="600">A + B + C ≤ 8</text>
    <text x="18" y="60" font-size="11" fill="#fca5a5">总量上限</text>
  </g>
  <g transform="translate(305,405)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="18" y="20" font-size="12" fill="#334155" font-weight="600">A + B + C ≤ 8 + M*r4</text>
    <text x="18" y="42" font-size="11" fill="#dc2626">r4=0：≤ 8（严格）</text>
    <text x="18" y="58" font-size="11" fill="#64748b">r4=1：≤ 108（几乎无约束）</text>
  </g>
  <g transform="translate(530,405)">
    <rect x="0" y="0" width="110" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">r4</text>
    <rect x="25" y="28" width="60" height="24" rx="12" fill="#ef4444"/>
    <circle cx="77" cy="40" r="9" fill="white"/>
    <text x="55" y="62" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">开 = 1</text>
  </g>

  <g transform="translate(80,485)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#f59e0b"/>
    <text x="18" y="20" font-size="11" font-weight="700" fill="#f59e0b">规则 5</text>
    <text x="18" y="42" font-size="14" fill="#334155" font-weight="600">B &gt; 3 → A ≤ 4</text>
    <text x="18" y="60" font-size="11" fill="#94a3b8">蕴含约束</text>
  </g>
  <g transform="translate(305,485)" filter="url(#shadow3)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="18" y="20" font-size="12" fill="#334155" font-weight="600">蕴含变量 + 松弛变量</text>
    <text x="18" y="42" font-size="11" fill="#475569">通过辅助变量实现</text>
    <text x="18" y="58" font-size="11" fill="#64748b">并附加 r5 松弛</text>
  </g>
  <g transform="translate(530,485)">
    <rect x="0" y="0" width="110" height="70" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="55" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">r5</text>
    <rect x="25" y="28" width="60" height="24" rx="12" fill="#e2e8f0"/>
    <circle cx="32" cy="40" r="9" fill="#94a3b8"/>
    <text x="55" y="62" text-anchor="middle" font-size="10" fill="#64748b">关 = 0</text>
  </g>

  <g transform="translate(660,405)">
    <rect x="0" y="0" width="460" height="70" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#shadow3)"/>
    <text x="230" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">用户输入</text>
    <text x="230" y="44" text-anchor="middle" font-size="16" fill="#78350f" font-weight="700">A = 6</text>
    <text x="230" y="62" text-anchor="middle" font-size="11" fill="#92400e">（硬性约束，固定不变）</text>
  </g>

  <rect x="80" y="570" width="1040" height="60" rx="12" fill="#1e3a5f" filter="url(#shadow3)"/>
  <text x="600" y="598" text-anchor="middle" font-size="16" fill="white" font-weight="700">目标函数</text>
  <text x="600" y="620" text-anchor="middle" font-size="18" fill="#fbbf24" font-weight="700">minimize  ( r1 + r2 + r3 + r4 + r5 )</text>

  <rect x="80" y="645" width="1040" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="108" cy="658" r="8" fill="#94a3b8"/>
  <text x="124" y="663" font-size="12" fill="#475569">r=0：规则生效（严格）</text>
  <circle cx="320" cy="658" r="8" fill="#22c55e"/>
  <text x="336" y="663" font-size="12" fill="#475569">r=1：规则被绕过（松弛）</text>
  <circle cx="540" cy="658" r="8" fill="#ef4444"/>
  <text x="556" y="663" font-size="12" fill="#475569">r=1 在冲突区域</text>
  <text x="750" y="663" font-size="11" fill="#64748b">最小化激活开关 → 绕过尽可能少的规则 → 最大程度保留原始约束</text>
</svg>
<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
  <title>3.6 六步流程全景图</title>
  <desc>完整工作流：建模、求解、添加松弛变量、重新求解、诊断、展示</desc>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow6" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#64748b" flood-opacity="0.15"/>
    </filter>
    <marker id="arrGreen" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="1200" height="640" fill="url(#bg6)"/>

  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a" letter-spacing="1">3.6 六步流程全景图：从冲突到清晰</text>
  <line x1="150" y1="58" x2="1050" y2="58" stroke="#cbd5e1" stroke-width="1.5"/>

  <g transform="translate(30,80)">
    <rect x="0" y="0" width="170" height="230" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
    <rect x="0" y="0" width="170" height="46" rx="14" fill="#3b82f6"/>
    <rect x="0" y="22" width="170" height="24" fill="#3b82f6"/>
    <circle cx="25" cy="28" r="14" fill="white"/>
    <text x="25" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#3b82f6">1</text>
    <text x="95" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="white">建模</text>
    <g transform="translate(55,56)">
      <rect x="0" y="0" width="60" height="40" rx="6" fill="#eff6ff"/>
      <text x="30" y="18" text-anchor="middle" font-size="20" fill="#3b82f6">A+B</text>
      <text x="30" y="34" text-anchor="middle" font-size="11" fill="#64748b">≥8</text>
    </g>
    <text x="85" y="115" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">业务规则</text>
    <text x="85" y="135" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">→</text>
    <text x="85" y="155" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">数学约束</text>
    <rect x="20" y="165" width="130" height="50" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="85" y="185" text-anchor="middle" font-size="11" fill="#15803d">A+B ≥ 8</text>
    <text x="85" y="200" text-anchor="middle" font-size="11" fill="#15803d">C ≤ 3</text>
    <text x="85" y="215" text-anchor="middle" font-size="11" fill="#15803d">A+B+C ≤ 8</text>
  </g>

  <line x1="210" y1="195" x2="240" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>

  <g transform="translate(250,80)">
    <rect x="0" y="0" width="170" height="230" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
    <rect x="0" y="0" width="170" height="46" rx="14" fill="#8b5cf6"/>
    <rect x="0" y="22" width="170" height="24" fill="#8b5cf6"/>
    <circle cx="25" cy="28" r="14" fill="white"/>
    <text x="25" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#8b5cf6">2</text>
    <text x="95" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="white">求解</text>
    <g transform="translate(45,55)">
      <circle cx="30" cy="25" r="22" fill="none" stroke="#8b5cf6" stroke-width="3"/>
      <line x1="46" y1="41" x2="60" y2="55" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="15" x2="40" y2="35" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="85" y="120" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">CP-SAT 求解器</text>
    <text x="85" y="140" text-anchor="middle" font-size="11" fill="#64748b">搜索有效</text>
    <text x="85" y="156" text-anchor="middle" font-size="11" fill="#64748b">变量赋值组合</text>
    <rect x="20" y="170" width="130" height="36" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="85" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">无解</text>
  </g>

  <line x1="430" y1="195" x2="460" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>

  <g transform="translate(470,80)">
    <rect x="0" y="0" width="170" height="230" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
    <rect x="0" y="0" width="170" height="46" rx="14" fill="#f59e0b"/>
    <rect x="0" y="22" width="170" height="24" fill="#f59e0b"/>
    <circle cx="25" cy="28" r="14" fill="white"/>
    <text x="25" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">3</text>
    <text x="95" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="white">添加松弛变量</text>
    <g transform="translate(40,55)">
      <rect x="0" y="0" width="90" height="50" rx="8" fill="#fef3c7"/>
      <text x="45" y="18" text-anchor="middle" font-size="10" fill="#92400e">A+B+C≤8</text>
      <rect x="8" y="26" width="35" height="16" rx="8" fill="#f59e0b"/>
      <circle cx="37" cy="34" r="6" fill="white"/>
      <text x="65" y="38" font-size="16" font-weight="700" fill="#f59e0b">r4</text>
    </g>
    <text x="85" y="120" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">给每条规则</text>
    <text x="85" y="140" text-anchor="middle" font-size="11" fill="#64748b">附加开关：</text>
    <text x="85" y="165" text-anchor="middle" font-size="11" fill="#475569">A+B+C ≤ 8+M*r4</text>
    <text x="85" y="185" text-anchor="middle" font-size="11" fill="#475569">A+B ≥ 8-M*r1</text>
    <text x="85" y="205" text-anchor="middle" font-size="11" fill="#475569">... + 松弛</text>
  </g>

  <line x1="650" y1="195" x2="680" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>

  <g transform="translate(690,80)">
    <rect x="0" y="0" width="170" height="230" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
    <rect x="0" y="0" width="170" height="46" rx="14" fill="#10b981"/>
    <rect x="0" y="22" width="170" height="24" fill="#10b981"/>
    <circle cx="25" cy="28" r="14" fill="white"/>
    <text x="25" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">4</text>
    <text x="95" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="white">重新求解</text>
    <g transform="translate(25,55)">
      <rect x="0" y="0" width="120" height="55" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
      <text x="60" y="20" text-anchor="middle" font-size="12" fill="#15803d" font-weight="600">minimize</text>
      <text x="60" y="40" text-anchor="middle" font-size="13" fill="#15803d" font-weight="700">sum(ri)</text>
      <text x="60" y="52" text-anchor="middle" font-size="10" fill="#16a34a">最少绕过规则</text>
    </g>
    <text x="85" y="125" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">求解器找到：</text>
    <rect x="20" y="140" width="130" height="36" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="85" y="164" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">已解决！sum=1</text>
    <text x="85" y="195" text-anchor="middle" font-size="11" fill="#475569">部分解：</text>
    <text x="85" y="212" text-anchor="middle" font-size="11" fill="#475569">A=6, B=2, C=2</text>
  </g>

  <line x1="870" y1="195" x2="900" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrGreen)"/>

  <g transform="translate(910,80)">
    <rect x="0" y="0" width="130" height="230" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
    <rect x="0" y="0" width="130" height="46" rx="14" fill="#ec4899"/>
    <rect x="0" y="22" width="130" height="24" fill="#ec4899"/>
    <circle cx="20" cy="28" r="14" fill="white"/>
    <text x="20" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#ec4899">5</text>
    <text x="72" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="white">诊断</text>
    <g transform="translate(20,55)">
      <circle cx="30" cy="20" r="20" fill="none" stroke="#ec4899" stroke-width="3"/>
      <line x1="45" y1="35" x2="60" y2="50" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
      <text x="30" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">r4=1</text>
    </g>
    <text x="65" y="115" text-anchor="middle" font-size="12" fill="#334155" font-weight="600">读取 ri = 1</text>
    <text x="65" y="135" text-anchor="middle" font-size="11" fill="#64748b">哪些规则</text>
    <text x="65" y="150" text-anchor="middle" font-size="11" fill="#64748b">被绕过了？</text>
    <rect x="15" y="160" width="100" height="55" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="65" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">规则 4</text>
    <text x="65" y="200" text-anchor="middle" font-size="11" fill="#7f1d1d">A+B+C ≤ 8</text>
    <text x="65" y="215" text-anchor="middle" font-size="10" fill="#fca5a5">不兼容</text>
  </g>

  <g transform="translate(1050,80)">
    <rect x="0" y="0" width="130" height="230" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
    <rect x="0" y="0" width="130" height="46" rx="14" fill="#1e3a5f"/>
    <rect x="0" y="22" width="130" height="24" fill="#1e3a5f"/>
    <circle cx="20" cy="28" r="14" fill="white"/>
    <text x="20" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">6</text>
    <text x="72" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="white">展示</text>
    <g transform="translate(20,55)">
      <rect x="0" y="0" width="90" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="10" y1="18" x2="80" y2="18" stroke="#3b82f6" stroke-width="2"/>
      <line x1="10" y1="30" x2="70" y2="30" stroke="#93c5fd" stroke-width="2"/>
      <line x1="10" y1="42" x2="75" y2="42" stroke="#93c5fd" stroke-width="2"/>
      <line x1="10" y1="54" x2="50" y2="54" stroke="#93c5fd" stroke-width="2"/>
    </g>
    <text x="65" y="130" text-anchor="middle" font-size="11" fill="#64748b">冲突报告</text>
    <text x="65" y="148" text-anchor="middle" font-size="11" fill="#64748b">+ 部分解</text>
    <rect x="10" y="158" width="110" height="60" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="65" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">规则4被松弛</text>
    <text x="65" y="196" text-anchor="middle" font-size="11" fill="#b45309">A=6, B=2, C=2</text>
    <text x="65" y="212" text-anchor="middle" font-size="10" fill="#92400e">上限：8 → 10</text>
  </g>

  <rect x="50" y="330" width="1100" height="80" rx="14" fill="#1e3a5f" filter="url(#shadow6)"/>
  <text x="600" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="white">完整工作流</text>
  <text x="600" y="382" text-anchor="middle" font-size="14" fill="#fbbf24" font-weight="600">业务规则 → 数学模型 → 无解 → 添加开关 → 最小化 sum(ri) → 可操作的诊断</text>
  <text x="600" y="402" text-anchor="middle" font-size="12" fill="#94a3b8">将"有解/无解"的二值问题转化为"哪些规则冲突 + 部分可行解"</text>

  <rect x="50" y="430" width="530" height="180" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="50" y="430" width="530" height="40" rx="14" fill="#3b82f6"/>
  <rect x="50" y="454" width="530" height="16" fill="#3b82f6"/>
  <text x="315" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="white">为什么松弛变量有效</text>

  <text x="80" y="495" font-size="12" font-weight="700" fill="#3b82f6">传统方式：</text>
  <rect x="80" y="505" width="470" height="36" rx="8" fill="#fef2f2"/>
  <text x="100" y="526" font-size="12" fill="#dc2626">"无解" → 用户困惑，需要人工排查</text>

  <text x="80" y="562" font-size="12" font-weight="700" fill="#10b981">松弛变量方式：</text>
  <rect x="80" y="572" width="470" height="36" rx="8" fill="#f0fdf4"/>
  <text x="100" y="593" font-size="12" fill="#16a34a">"规则4被松弛，部分解 A=6,B=2,C=2" → 用户可决策</text>

  <rect x="600" y="430" width="550" height="180" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="600" y="430" width="550" height="40" rx="14" fill="#059669"/>
  <rect x="600" y="454" width="550" height="16" fill="#059669"/>
  <text x="875" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="white">核心公式</text>

  <g font-size="12" fill="#334155">
    <text x="625" y="490" font-weight="700" fill="#3b82f6">步骤1（建模）：</text>
    <text x="625" y="508">业务规则 → A+B+C ≤ 8, A+B ≥ 8, ...</text>
    <text x="625" y="530" font-weight="700" fill="#8b5cf6">步骤3（松弛）：</text>
    <text x="625" y="548">添加 ri：A+B+C ≤ 8 + M*r4</text>
    <text x="625" y="570" font-weight="700" fill="#f59e0b">步骤4（目标）：</text>
    <text x="625" y="588">minimize sum(wi * ri)</text>
    <text x="625" y="610" font-weight="700" fill="#10b981">步骤5（诊断）：</text>
    <text x="625" y="628">读取 ri = 1 → 冲突规则</text>
  </g>

  <text x="600" y="625" text-anchor="middle" font-size="12" fill="#94a3b8">最小化 sum(ri) 找到最少规则集合松弛，最大程度保留原始业务逻辑</text>
</svg>